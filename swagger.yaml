openapi: 3.0.0
info:
  title: Series Tracker API
  version: 1.0.0
  description: REST API to manage a personal series tracker

servers:
  - url: https://proyecto1-stw-backend-production.up.railway.app
  - url: http://localhost:8080


paths:
  /series:
    get:
      summary: List all series
      parameters:
        - in: query
          name: q
          schema: { type: string }
          description: Search by name
        - in: query
          name: sort
          schema: { type: string, enum: [id, name, current_episode, total_episodes] }
        - in: query
          name: order
          schema: { type: string, enum: [asc, desc] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated list of series
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/SeriesWithRating" }
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }

    post:
      summary: Create a new series
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeriesInput" }
      responses:
        "201":
          description: Series created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Series" }
        "400":
          description: Invalid input
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /series/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }

    get:
      summary: Get a series by ID
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Series" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    put:
      summary: Update a series
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SeriesInput" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Series" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

    delete:
      summary: Delete a series
      responses:
        "204":
          description: Deleted successfully
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /series/{id}/rating:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }

    get:
      summary: Get rating for a series
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  series_id: { type: integer }
                  rating: { type: integer }

    post:
      summary: Set rating for a series
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                  minimum: 0
                  maximum: 10
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  series_id: { type: integer }
                  rating: { type: integer }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    Series:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        current_episode: { type: integer }
        total_episodes: { type: integer }
        image_url: { type: string }

    SeriesWithRating:
      allOf:
        - $ref: "#/components/schemas/Series"
        - type: object
          properties:
            rating: { type: integer }

    SeriesInput:
      type: object
      required: [name, total_episodes]
      properties:
        name: { type: string }
        current_episode: { type: integer, minimum: 0 }
        total_episodes: { type: integer, minimum: 1 }
        image_url: { type: string }

    Error:
      type: object
      properties:
        error: { type: string }